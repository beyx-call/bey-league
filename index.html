<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベイリーグカウンター</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont;
    margin:0;
    padding:20px;
    background:#f6f7fb;
}

h1{
    text-align:center;
    font-size:22px;
    margin-bottom:20px;
}

button{
    padding:12px;
    font-size:16px;
    border-radius:10px;
    border:none;
    background:#2f80ed;
    color:white;
}

select{
    padding:10px;
    font-size:16px;
    border-radius:8px;
}

.match{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin:10px 0;
    font-size:18px;
}

.score{
    width:60px;
    height:55px;
    font-size:24px;
    text-align:center;
    border-radius:12px;
    border:1px solid #ddd;
}

.rank-table{
    margin-top:20px;
}

.rank-row{
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:white;
    border-radius:12px;
    margin-bottom:8px;
}

.rank-num{
    font-weight:bold;
    color:#ff6b6b;
}

.player-num{
    color:#2f80ed;
}

.reset{
    margin-top:15px;
    background:#ff4d4f;
}
</style>
</head>

<body>

<h1>ベイリーグカウンター</h1>

<div>
対戦人数：
<select id="playerCount">
<option value="4">4人</option>
<option value="5">5人</option>
<option value="6">6人</option>
<option value="7">7人</option>
<option value="8">8人</option>
</select>

<button onclick="startLeague()">開始</button>
</div>

<div id="matches"></div>
<div id="ranking"></div>
<button class="reset" onclick="location.reload()">全部リセット</button>

<script>
let players=[];
let results=[];

function startLeague(){
    let count=parseInt(document.getElementById("playerCount").value);
    players=[];
    results=[];
    for(let i=1;i<=count;i++){
        players.push({num:i,points:0,goal:0,against:0});
    }
    generateMatches();
}

function generateMatches(){
    let container=document.getElementById("matches");
    container.innerHTML="";
    for(let i=0;i<players.length;i++){
        for(let j=i+1;j<players.length;j++){
            let div=document.createElement("div");
            div.className="match";
            div.innerHTML=`
            <span>${players[i].num}</span>
            <input class="score" type="number" min="0" onchange="updateScore(${i},${j},this,0)">
            -
            <input class="score" type="number" min="0" onchange="updateScore(${i},${j},this,1)">
            <span>${players[j].num}</span>
            `;
            container.appendChild(div);
        }
    }
}

function updateScore(i,j,input,type){
    let row=input.parentElement;
    let inputs=row.querySelectorAll("input");
    let scoreA=parseInt(inputs[0].value)||0;
    let scoreB=parseInt(inputs[1].value)||0;

    players.forEach(p=>{p.points=0;p.goal=0;p.against=0;});

    document.querySelectorAll(".match").forEach(m=>{
        let ins=m.querySelectorAll("input");
        let s1=parseInt(ins[0].value);
        let s2=parseInt(ins[1].value);
        if(!isNaN(s1)&&!isNaN(s2)){
            let left=parseInt(m.children[0].innerText);
            let right=parseInt(m.children[4].innerText);
            let A=players[left-1];
            let B=players[right-1];

            A.goal+=s1;
            A.against+=s2;
            B.goal+=s2;
            B.against+=s1;

            if(s1>s2){A.points+=3;}
            else if(s1<s2){B.points+=3;}
            else{A.points+=1;B.points+=1;}
        }
    });

    updateRanking();
}

function updateRanking(){
    let sorted=[...players].sort((a,b)=>{
        if(b.points!==a.points)return b.points-a.points;
        return (b.goal-b.against)-(a.goal-a.against);
    });

    let container=document.getElementById("ranking");
    container.innerHTML="<div class='rank-table'>";
    sorted.forEach((p,index)=>{
        container.innerHTML+=`
        <div class="rank-row">
        <span class="rank-num">${index+1}位</span>
        <span class="player-num">#${p.num}</span>
        <span>${p.points}pt</span>
        </div>
        `;
    });
    container.innerHTML+="</div>";
}
</script>

</body>
</html>
