<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベイリーグカウンター</title>

<style>
body{
margin:0;
background:#f4f6f8;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
display:flex;
justify-content:center;
padding:20px;
}

.app{
width:100%;
max-width:420px;
background:white;
border-radius:24px;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
padding:20px;
}

h1{
text-align:center;
font-size:20px;
margin-bottom:20px;
}

.match{
background:#f9fafb;
border-radius:16px;
padding:12px;
margin-bottom:12px;
}

.match-title{
font-weight:bold;
margin-bottom:8px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

button{
border:none;
border-radius:12px;
padding:6px 14px;
font-size:16px;
background:#e5e7eb;
}

button:active{
transform:scale(0.95);
}

.score{
font-weight:bold;
font-size:18px;
}

.reset-all{
margin-top:20px;
width:100%;
background:#ef4444;
color:white;
padding:12px;
border-radius:16px;
font-size:16px;
}
</style>
</head>

<body>

<div class="app">
<h1>ベイリーグカウンター</h1>
<div id="matches"></div>
<button class="reset-all" onclick="resetAll()">全部リセット</button>
</div>

<script>
const matchCount = 6;
let scores = [];

function init(){
scores = [];
for(let i=0;i<matchCount;i++){
scores.push({a:0,b:0});
}
render();
}

function render(){
const container=document.getElementById("matches");
container.innerHTML="";
scores.forEach((match,index)=>{
const div=document.createElement("div");
div.className="match";
div.innerHTML=
"<div class='match-title'>試合"+(index+1)+"</div>"+
"<div class='row'>"+
"<button onclick=\"changeScore("+index+",'a',-1)\">-</button>"+
"<div class='score'>"+match.a+"</div>"+
"<button onclick=\"changeScore("+index+",'a',1)\">+</button>"+
"</div>"+
"<div class='row'>"+
"<button onclick=\"changeScore("+index+",'b',-1)\">-</button>"+
"<div class='score'>"+match.b+"</div>"+
"<button onclick=\"changeScore("+index+",'b',1)\">+</button>"+
"</div>";
container.appendChild(div);
});
}

function changeScore(i,team,amount){
scores[i][team]+=amount;
if(scores[i][team]<0){scores[i][team]=0;}
render();
}

function resetAll(){
if(confirm("本当に全部リセットする？")){
init();
}
}

init();
</script>

</body>
</html>
