<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 BEY LEAGUE</title>
<style>
body{
  font-family:sans-serif;
  margin:0;
  padding:20px;
  background:#f4f6fa;
}

h1{text-align:center;}

/* ===== コントロールエリアに意味を持たせる ===== */
.controlBar{
  display:flex;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.controlLeft{
  display:flex;
  align-items:center;
  gap:10px;
}

.controlRight{
  margin-left:auto;
}

/* ボタン共通 */
button{
  font-size:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.startBtn{
  background:#2c3e50;
}

.startBtn:hover{
  background:#1f2c38;
}

.resetBtn{
  background:#c0392b;
}

.resetBtn:hover{
  background:#962d22;
}

/* 保存ボタンを数％濃く */
.saveBtn{
  background:#1f2c38;
}

.saveBtn:hover{
  background:#16202a;
}

table{
  border-collapse:collapse;
  margin-top:20px;
  background:white;
}

th,td{
  border:1px solid #ccc;
  width:90px;
  height:60px;
  text-align:center;
  vertical-align:middle;
  font-size:18px;
}

th{
  background:#eef2f7;
}

.disabled{
  background:#f0f0f0;
  color:#bbb;
}

.matchCell{
  cursor:pointer;
  background:#fff8f8;
  white-space:nowrap;
  font-weight:bold;
}

.matchCell.done{
  background:#dff5e4;
  cursor:default;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}

.modalContent{
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  width:300px;
}

input{
  width:80px;
  height:40px;
  font-size:20px;
  text-align:center;
  margin:10px;
}

/* ===== 順位表 ===== */

.rankingTitle{
  margin-top:50px;
  font-size:24px;
  font-weight:bold;
  text-align:center;
}

.rankingTable{
  width:100%;
  margin-top:15px;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.rankingTable th{
  background:#2c3e50;
  color:white;
  font-weight:normal;
}

.rankingTable tr:nth-child(even){
  background:#f8fafc;
}

.first{ background:#fff8dc !important; }
.second{ background:#eef3ff !important; }
.third{ background:#fff1e6 !important; }

.badge{
  font-size:20px;
}

.diffPlus{
  color:#1e8e3e;
  font-weight:bold;
}

.diffMinus{
  color:#d93025;
  font-weight:bold;
}
</style>
</head>
<body>

<h1>🏆 BEY LEAGUE</h1>

<div class="controlBar">
  <div class="controlLeft">
    <label>人数：</label>
    <input type="number" id="playerCount" value="4" min="2" max="8">
    <button class="startBtn" onclick="init()">開始</button>
  </div>

  <div class="controlRight">
    <button class="resetBtn" onclick="resetLeague()">リセット</button>
  </div>
</div>

<div id="area"></div>

<div class="modal" id="modal">
<div class="modalContent">
<h3 id="title"></h3>
<input type="number" id="s1">
-
<input type="number" id="s2"><br>
<button class="saveBtn" onclick="save()">保存</button>
</div>
</div>

<script>
/* ここから下は一切変更なし */
let players=[];
let currentMatch=null;

function init(){
  let n=parseInt(playerCount.value);
  players=[];

  for(let i=1;i<=n;i++){
    players.push({
      win:0,
      lose:0,
      scored:0,
      conceded:0
    });
  }

  let html="<table><tr><th></th>";
  for(let i=1;i<=n;i++){
    html+="<th>"+i+"</th>";
  }
  html+="</tr>";

  for(let i=1;i<=n;i++){
    html+="<tr><th>"+i+"</th>";
    for(let j=1;j<=n;j++){
      if(i===j){
        html+='<td class="disabled">＼</td>';
      }
      else if(i<j){
        html+='<td class="matchCell" id="m'+i+'_'+j+'" onclick="openMatch('+i+','+j+')">-</td>';
      }
      else{
        html+='<td class="disabled" id="m'+i+'_'+j+'"></td>';
      }
    }
    html+="</tr>";
  }

  html+="</table>";
  html+='<div id="rankingArea"></div>';

  area.innerHTML=html;

  updateRanking();
}

function openMatch(i,j){
  currentMatch={i,j};
  title.innerText=i+" vs "+j;
  s1.value="";
  s2.value="";
  modal.style.display="flex";
}

function save(){
  let i=currentMatch.i;
  let j=currentMatch.j;
  let a=parseInt(s1.value);
  let b=parseInt(s2.value);

  if(isNaN(a)||isNaN(b)){alert("数字入れて");return;}

  let mark="";
  if(a>b){
    mark="○";
    players[i-1].win++;
    players[j-1].lose++;
  }
  else if(b>a){
    mark="×";
    players[j-1].win++;
    players[i-1].lose++;
  }
  else{
    mark="△";
  }

  players[i-1].scored += a;
  players[i-1].conceded += b;
  players[j-1].scored += b;
  players[j-1].conceded += a;

  let cell=document.getElementById("m"+i+"_"+j);
  cell.innerText=mark+" "+a+"-"+b;
  cell.classList.add("done");
  cell.onclick=null;

  let rev=document.getElementById("m"+j+"_"+i);
  if(rev){
    let revMark="";
    if(a>b) revMark="×";
    else if(b>a) revMark="○";
    else revMark="△";
    rev.innerText=revMark+" "+b+"-"+a;
  }

  modal.style.display="none";
  updateRanking();
}

function updateRanking(){
  let ranking=[...players].map((p,index)=>({
    num:index+1,
    win:p.win,
    lose:p.lose,
    scored:p.scored,
    conceded:p.conceded,
    diff:p.scored-p.conceded
  }));

  ranking.sort((a,b)=>{
    if(b.win!==a.win) return b.win-a.win;
    if(b.diff!==a.diff) return b.diff-a.diff;
    return b.scored-a.scored;
  });

  let html='<div class="rankingTitle">🏅 順位ランキング</div>';
  html+='<table class="rankingTable">';
  html+="<tr><th>順位</th><th>番号</th><th>勝</th><th>負</th><th>得点</th><th>失点</th><th>得失点差</th></tr>";

  ranking.forEach((p,i)=>{
    let rowClass="";
    let badge="";
    if(i===0){ rowClass="first"; badge="🥇 "; }
    else if(i===1){ rowClass="second"; badge="🥈 "; }
    else if(i===2){ rowClass="third"; badge="🥉 "; }

    let diffClass="";
    if(p.diff>0) diffClass="diffPlus";
    if(p.diff<0) diffClass="diffMinus";

    html+='<tr class="'+rowClass+'">';
    html+="<td class='badge'>"+badge+(i+1)+"</td>";
    html+="<td>"+p.num+"</td>";
    html+="<td>"+p.win+"</td>";
    html+="<td>"+p.lose+"</td>";
    html+="<td>"+p.scored+"</td>";
    html+="<td>"+p.conceded+"</td>";
    html+='<td class="'+diffClass+'">'+p.diff+"</td>";
    html+="</tr>";
  });

  html+="</table>";
  document.getElementById("rankingArea").innerHTML=html;
}

function resetLeague(){
  if(!confirm("本当にリセットする？")) return;
  init();
}
</script>

</body>
</html>
