<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベイリーグカウンター</title>
<style>
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; margin:0; padding:20px; background:#f6f7fb; }
h1 { text-align:center; font-size:24px; margin-bottom:20px; }
button { padding:12px; font-size:18px; border-radius:10px; border:none; background:#2f80ed; color:white; }
select { padding:10px; font-size:16px; border-radius:8px; }
.match { display:flex; align-items:center; justify-content:center; gap:12px; margin:10px 0; }
.score { width:60px; height:55px; font-size:24px; text-align:center; border-radius:12px; border:1px solid #ddd; }
.rank-table { margin-top:20px; }
.rank-row { display:flex; justify-content:space-between; padding:10px; background:white; border-radius:12px; margin-bottom:8px; }
.rank-num { font-weight:bold; color:#ff6b6b; }
.player-num { color:#2f80ed; }
.reset { margin-top:15px; background:#ff4d4f; }
</style>
</head>
<body>

<h1>ベイリーグカウンター</h1>

<div>
対戦人数：
<select id="playerCount">
<option value="4">4人</option>
<option value="5">5人</option>
<option value="6">6人</option>
<option value="7">7人</option>
<option value="8">8人</option>
</select>
<button onclick="startLeague()">開始</button>
</div>

<div id="matches"></div>
<div id="ranking"></div>
<button class="reset" onclick="location.reload()">全部リセット</button>

<script>
let players = [];

function startLeague() {
    const count = parseInt(document.getElementById("playerCount").value);
    players = [];
    for(let i=1;i<=count;i++) players.push({num:i, wins:0, goal:0, against:0});
    generateMatches();
    updateRanking();
}

function generateMatches() {
    const container = document.getElementById("matches");
    container.innerHTML="";
    for(let i=0;i<players.length;i++){
        for(let j=i+1;j<players.length;j++){
            const div=document.createElement("div");
            div.className="match";
            div.innerHTML=`
                <span>${players[i].num}</span>
                <input class="score" type="number" value="0" min="0" onchange="updateScore()">
                -
                <input class="score" type="number" value="0" min="0" onchange="updateScore()">
                <span>${players[j].num}</span>
            `;
            container.appendChild(div);
        }
    }
}

function updateScore(){
    players.forEach(p=>{p.wins=0; p.goal=0; p.against=0;});
    document.querySelectorAll(".match").forEach(m=>{
        const inputs=m.querySelectorAll("input");
        const s1=parseInt(inputs[0].value)||0;
        const s2=parseInt(inputs[1].value)||0;
        const left=parseInt(m.children[0].innerText)-1;
        const right=parseInt(m.children[4].innerText)-1;
        const A=players[left], B=players[right];
        A.goal+=s1; A.against+=s2;
        B.goal+=s2; B.against+=s1;
        if(s1>s2) A.wins+=1;
        else if(s1<s2) B.wins+=1;
        // 引き分けはゼロ扱い
    });
    updateRanking();
}

function updateRanking(){
    const sorted=[...players].sort((a,b)=>{
        if(b.wins!==a.wins) return b.wins - a.wins;
        return (b.goal - b.against) - (a.goal - a.against);
    });
    const container=document.getElementById("ranking");
    container.innerHTML="<div class='rank-table'>";
    sorted.forEach((p,index)=>{
        container.innerHTML+=`
        <div class="rank-row">
            <span class="rank-num">${index+1}位</span>
            <span class="player-num">#${p.num}</span>
            <span>${p.goal - p.against}点差</span>
        </div>`;
    });
    container.innerHTML+="</div>";
}
</script>
</body>
</html>
