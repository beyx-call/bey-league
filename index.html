<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEY LEAGUE</title>

<link rel="icon" href="data:,">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
font-family:sans-serif;
margin:0;
padding:15px;
background:#f7f9fc;
color:#333;
}

h1{
text-align:center;
font-size:28px;
margin:10px 0 20px;
}

input,button{
font-size:24px;
height:65px;
margin:10px 0;
width:100%;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#2c3e50;
color:white;
border:none;
}

button.danger{
background:#c0392b;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

th{
background:#eef2f7;
}

th,td{
border:1px solid #e3e8ef;
padding:16px;
text-align:center;
font-size:20px;
}

td.disabled{
background:#f2f4f8;
color:#bbb;
}

.matchCell{
background:#fff6f6;
cursor:pointer;
}

.matchCell.done{
background:#e6f6ea;
font-weight:bold;
}

.rankBadge{
font-weight:bold;
color:white;
padding:5px 10px;
border-radius:8px;
}

.rank1{background:#d4af37;}
.rank2{background:#b0b0b0;}
.rank3{background:#c27c3b;}
.rankOther{background:#6c7a89;}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
}

.modalContent{
background:white;
padding:25px;
width:90%;
border-radius:15px;
text-align:center;
}
</style>
</head>

<body>

<h1>🏆 BEY LEAGUE</h1>

<h3>参加人数（2～8）</h3>
<input type="number" id="playerCount" min="2" max="8">
<button onclick="initLeague()">開始</button>

<div id="leagueArea" style="display:none;">
<h3>総当たり対戦表</h3>
<table id="matchTable"></table>

<h3>順位表</h3>
<table id="ranking"></table>

<button onclick="undoMatch()">直前取り消し</button>
<button class="danger" onclick="resetLeague()">全部リセット</button>
</div>

<div class="modal" id="scoreModal">
<div class="modalContent">
<h2 id="matchTitle"></h2>
<input type="number" id="score1" placeholder="左の得点">
<input type="number" id="score2" placeholder="右の得点">
<button onclick="saveScore()">保存</button>
</div>
</div>

<script>
let players=[];
let matchHistory=[];
let matchResults={};
let currentMatch=null;
let currentCount=0;

function initLeague(){
let count=parseInt(playerCount.value);
if(isNaN(count)||count<2||count>8){
alert("2～8人で入力してね");
return;
}
currentCount=count;
createPlayers(count);
generateMatchTable(count);
updateRanking();
leagueArea.style.display="block";
}

function createPlayers(count){
players=[];
matchHistory=[];
matchResults={};
for(let i=1;i<=count;i++){
players.push({number:i,win:0,draw:0,lose:0,scored:0,conceded:0});
}
}

function resetLeague(){
if(!confirm("本当に全試合をリセットする？"))return;
createPlayers(currentCount);
generateMatchTable(currentCount);
updateRanking();
}

function generateMatchTable(count){
matchTable.innerHTML="";
let header="<tr><th></th>";
for(let i=1;i<=count;i++)header+=`<th>${i}</th>`;
header+="</tr>";
matchTable.innerHTML+=header;

for(let i=1;i<=count;i++){
let row=`<tr><th>${i}</th>`;
for(let j=1;j<=count;j++){
if(i===j)row+=`<td class="disabled">×</td>`;
else if(i<j)
row+=`<td class="matchCell" onclick="openModal(${i},${j})" id="m${i}_${j}">-</td>`;
else row+=`<td></td>`;
}
row+="</tr>";
matchTable.innerHTML+=row;
}
}

function openModal(i,j){
currentMatch={i,j};
matchTitle.innerText=`${i} vs ${j}`;
score1.value="";
score2.value="";
scoreModal.style.display="flex";
}

function saveScore(){
let i=currentMatch.i;
let j=currentMatch.j;
let s1=parseInt(score1.value);
let s2=parseInt(score2.value);
if(isNaN(s1)||isNaN(s2)){alert("数字で入力してね");return;}

if(matchResults[`m${i}_${j}`]){
reverseMatch(i-1,j-1,matchResults[`m${i}_${j}`].s1,matchResults[`m${i}_${j}`].s2);
}

applyMatch(i-1,j-1,s1,s2);
matchResults[`m${i}_${j}`]={s1,s2};
matchHistory.push({i:i-1,j:j-1,s1,s2,key:`m${i}_${j}`});

let cell=document.getElementById(`m${i}_${j}`);
cell.innerHTML=`${s1}-${s2}`;
cell.classList.add("done");

scoreModal.style.display="none";
updateRanking();
}

function applyMatch(i1,i2,s1,s2){
players[i1].scored+=s1;
players[i1].conceded+=s2;
players[i2].scored+=s2;
players[i2].conceded+=s1;

if(s1>s2){players[i1].win++;players[i2].lose++;}
else if(s2>s1){players[i2].win++;players[i1].lose++;}
else{players[i1].draw++;players[i2].draw++;}
}

function reverseMatch(i1,i2,s1,s2){
players[i1].scored-=s1;
players[i1].conceded-=s2;
players[i2].scored-=s2;
players[i2].conceded-=s1;

if(s1>s2){players[i1].win--;players[i2].lose--;}
else if(s2>s1){players[i2].win--;players[i1].lose--;}
else{players[i1].draw--;players[i2].draw--;}
}

function undoMatch(){
if(matchHistory.length===0){alert("取り消せる試合がないよ");return;}
let last=matchHistory.pop();
reverseMatch(last.i,last.j,last.s1,last.s2);
matchResults[last.key]=null;
let cell=document.getElementById(last.key);
cell.innerHTML="-";
cell.classList.remove("done");
updateRanking();
}

function updateRanking(){
ranking.innerHTML=`<tr>
<th>順位</th><th>番号</th>
<th>勝</th><th>分</th><th>負</th>
<th>得点</th><th>失点</th><th>差</th>
</tr>`;

let sorted=[...players].sort((a,b)=>{
if(b.win!==a.win)return b.win-a.win;
let diffA=a.scored-a.conceded;
let diffB=b.scored-b.conceded;
if(diffB!==diffA)return diffB-diffA;
return b.draw-a.draw;
});

sorted.forEach((p,i)=>{
let rankClass="rankOther";
if(i===0)rankClass="rank1";
else if(i===1)rankClass="rank2";
else if(i===2)rankClass="rank3";

ranking.innerHTML+=`
<tr>
<td><span class="rankBadge ${rankClass}">${i+1}</span></td>
<td>${p.number}</td>
<td>${p.win}</td>
<td>${p.draw}</td>
<td>${p.lose}</td>
<td>${p.scored}</td>
<td>${p.conceded}</td>
<td>${p.scored-p.conceded}</td>
</tr>`;
});
}
</script>

</body>
</html>
